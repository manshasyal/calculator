<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style rel="stylesheet" href="style.css">
        </style>
</head>
<body>
    <div class="calculator">
        <input type="text" class="display" id="display"  readonly>
        <div class="button">
            <button class="C" onclick="clearDisplay()" >C</button>
            <button class="operator" onclick="appendOperation('/')">/</button>
            <button class="operator" onclick="appendOperation('*')"> * </button>
            <button class="operator" onclick="appendOperation('-')"> - </button><br>

            <button class="number" onclick="appenNumber('7')">7</button>
            <button class="number" onclick="appenNumber('8')">8</button>
            <button class="number" onclick="appenNumber('9')">9</button>
            <button class="operator" onclick="appendOperation('+')">+</button><br>

            <button class="number" onclick="appenNumber('4')">4</button>
            <button class="number" onclick="appenNumber('5')">5</button>
            <button class="number" onclick="appenNumber('6')">6</button>
            <button class="operator"  onclick="calculate()">=</button><br>

            <button class="number" onclick="appenNumber('1')">1</button>
            <button class="number" onclick="appenNumber('2')">2</button>
            <button class="number" onclick="appenNumber('3')">3</button>
            <button class="number" onclick="appenNumber('0')">0</button>
        </div>
   </div>
    <script src="calc.js">
           
    </script>
</body>
</html>
